# ─── 系统全局设置 ───
system:
  wake_duration_minutes: 60
  sleep_duration_minutes: 10
  prediction_error_threshold: 0.6
  memory_importance_threshold: 0.8
  embedding_model: "all-MiniLM-L6-v2"
