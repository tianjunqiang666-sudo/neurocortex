# NeuroCortex AI — 模型注册表 (含能力契约)
# 所有 API Key 必须通过环境变量读取，绝不出现在此文件中

model_registry:
  # ─── 本地快速模型：用于低延迟、结构化输出任务 ───
  local-fast:
    provider: ollama
    model_name: "qwen2.5:7b"
    endpoint: "http://localhost:11434"
    scope: ["amygdala", "thalamus", "parietal"]
    capability_contract:
      input_schema:
        type: object
        properties:
          text: {type: string}
      output_schema:
        type: object
        properties:
          threat_level: {type: number, minimum: 0, maximum: 1}
          emotion_label: {type: string}
      reasoning_depth: low

  # ─── 本地智能模型：用于深度推理、规划、知识蒸馏 ───
  local-smart:
    provider: ollama
    model_name: "deepseek-r1:8b"
    endpoint: "http://localhost:11434"
    scope: ["frontal", "hippocampus-consolidation"]
    capability_contract:
      output_schema:
        type: string
      reasoning_depth: high

  # ─── 本地视觉模型：用于视觉感知 ───
  local-vision:
    provider: ollama
    model_name: "llava:7b"
    endpoint: "http://localhost:11434"
    scope: ["occipital"]
    capability_contract:
      output_schema:
        type: object
        properties:
          objects: {type: array}
          scene: {type: string}
      reasoning_depth: low

  # ─── 云端模型模板（按需启用）───
